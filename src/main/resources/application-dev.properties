security.jwt.secret=dev-secret-change-me

# Internal API access control
internal.api.service-tokens.inventory-service=seats-strong-dev-token
internal.api.service-tokens.booking-service=booking-service-dev-token

# Local PostgreSQL (dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/booking_db?currentSchema=booking_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=booking_db
