spring.application.name=booking-service
api.prefix=/booking-service/v1
server.servlet.context-path=${api.prefix}

# PostgreSQL datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/booking_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never

# Spring profiles
spring.profiles.group.dev=dev,common
spring.profiles.group.qa=qa,common
spring.profiles.group.prod=prod,common
